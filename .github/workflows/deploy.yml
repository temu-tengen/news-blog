name: Deploy to Surge
on:
  push:
    branches:
      - main # Change to 'master' if your default branch is master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # or pnpm / yarn

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build

      - name: Deploy to Surge
        uses: dswistowski/surge-sh-action@v1
        with:
          project: 'out' # Next.js default output directory for 'next export'
          login: 'shalin.mehta2015@gmail.com'
          token: ${{ secrets.SURGE_TOKEN }}
          domain: 'news-blog-njs.surge.sh' # Replace with your Surge domain
